<!DOCTYPE html>
<html>
<head>
    <title>SCP Foundation Secure Login</title>
   <script src="visitor-info.js" defer></script>
    <style>
        body {
            background: #000;
            font-family: "Courier New", monospace;
            color: #00ff00;
            margin: 0;
            padding: 0;
            background-image: url('noise.png');
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #111;
            padding: 2em;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5em;
            filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.7));
            animation: glow 3s ease-in-out infinite alternate;
        }

        .logo img {
            width: 200px; /* Increased from 150px */
            display: block;
            margin: 0 auto;
            border-radius: 4px;
            transition: filter 0.3s ease;
        }

        /* Glow animation */
        @keyframes glow {
            0% {
                filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 12px rgba(0, 255, 0, 0.9)) 
                        drop-shadow(0 0 20px rgba(0, 255, 0, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.8))
                        drop-shadow(0 0 25px rgba(0, 255, 128, 0.6));
            }
        }

        /* Scan line effect over the logo */
        .logo::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0, 255, 0, 0.3);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                top: 100%;
                opacity: 0.3;
            }
        }

        h1 {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 1em;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .warning {
            color: #ff0000;
            text-align: center;
            margin-bottom: 1em;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 0.5em;
            margin-bottom: 1em;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: "Courier New", monospace;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 0.5em;
            background: #003300;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: "Courier New", monospace;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            background: #004400;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .security-notice {
            margin-top: 1em;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
